storage:
  endpoint: "http://localhost:9000"
  region: "us-east-1"
  bucket: "petabyte-images"
  access_key_id: "minioadmin"
  secret_access_key: "minioadmin"
  use_path_style: true

worker:
  id: ""           # leave empty to auto-generate UUID
  coordinator_url: "http://localhost:8090"
  host: "0.0.0.0"
  port: 9001
  concurrency: 4
  poll_interval: 2s
  heartbeat_interval: 5s

logging:
  level: info
  format: text
