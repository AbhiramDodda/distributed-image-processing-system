# A configured bucket enables the exactly-once result-commit path: the
# coordinator promotes each worker's staged output to its canonical key. Leave
# the bucket empty to run the coordinator storage-free (at-least-once).
storage:
  endpoint: "http://localhost:9000"
  region: "us-east-1"
  bucket: "petabyte-images"
  access_key_id: "minioadmin"
  secret_access_key: "minioadmin"
  use_path_style: true

coordinator:
  host: "0.0.0.0"
  port: 8090
  suspect_timeout: 10s
  dead_timeout: 20s
  heartbeat_interval: 5s
  dispatch_interval: 1s
  vnodes_per_node: 150
  task_max_retries: 3
  lease_chunk: 0                  # items granted per lease renewal (0 = default 1000); lower it to make large shards splittable sooner for work-stealing
  wal_dir: ./coordinator-wal      # empty disables WAL persistence
  checkpoint_interval: 30s
  max_in_flight_jobs: 0           # >0 caps concurrently-admitted jobs (backpressure); submissions past it get 429
  grpc_port: 0                    # >0 enables the gRPC control-plane API (Level 6)
  jwt_secret: ""                  # required when grpc_port > 0; HS256 signing secret
  rate_limit_per_sec: 50          # per-tenant token refill rate at the gRPC gateway
  rate_limit_burst: 100           # per-tenant burst capacity
  # Raft consensus for multi-process HA + consensus-agreed exactly-once commits.
  # Disabled unless raft.id > 0 and peers are listed. Each coordinator sets its own
  # id/port and lists every member (including itself) with its raft gRPC address.
  raft:
    id: 0                         # >0 enables raft; this node's raft id
    port: 8100                    # this node's raft gRPC listener
    peers: []                     # e.g. [{id: 1, address: "10.0.0.1:8100"}, {id: 2, address: "10.0.0.2:8100"}, ...]

metrics:
  enabled: true
  port: 9090
  path: /metrics

logging:
  level: info
  format: text
