coordinator:
  host: "0.0.0.0"
  port: 8090
  suspect_timeout: 10s
  dead_timeout: 20s
  heartbeat_interval: 5s
  dispatch_interval: 1s
  vnodes_per_node: 150
  task_max_retries: 3
  wal_dir: ./coordinator-wal      # empty disables WAL persistence
  checkpoint_interval: 30s
  grpc_port: 0                    # >0 enables the gRPC control-plane API (Level 6)
  jwt_secret: ""                  # required when grpc_port > 0; HS256 signing secret
  rate_limit_per_sec: 50          # per-tenant token refill rate at the gRPC gateway
  rate_limit_burst: 100           # per-tenant burst capacity

metrics:
  enabled: true
  port: 9090
  path: /metrics

logging:
  level: info
  format: text
