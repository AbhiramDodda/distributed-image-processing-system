apiVersion: v1
kind: ServiceAccount
metadata:
  name: petabyte-worker
  namespace: petabyte
---
# DaemonSet ensures one worker pod per node so tasks run data-local
# (each pod has access to the node's NVMe cache via hostPath).
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: worker
  namespace: petabyte
  labels:
    app: petabyte-worker-daemon
spec:
  selector:
    matchLabels:
      app: petabyte-worker-daemon
  template:
    metadata:
      labels:
        app: petabyte-worker-daemon
    spec:
      serviceAccountName: petabyte-worker
      containers:
        - name: worker
          image: petabyte-worker:latest
          args: ["-config", "/config/worker.yaml"]
          env:
            - name: PETABYTE_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - name: api
              containerPort: 9001
          volumeMounts:
            - name: config
              mountPath: /config
            - name: nvme-cache
              mountPath: /mnt/nvme
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9001
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "8"
              memory: "16Gi"
      tolerations:
        - operator: Exists
      volumes:
        - name: config
          configMap:
            name: petabyte-config
        - name: nvme-cache
          hostPath:
            path: /mnt/nvme
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: worker
  namespace: petabyte
  labels:
    app: petabyte-worker-daemon
spec:
  selector:
    app: petabyte-worker-daemon
  clusterIP: None
  ports:
    - name: api
      port: 9001
      targetPort: 9001
